name: Markdown Translation

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  get-files:
    if: github.event.issue.pull_request && github.event.comment.body == '@github /translate'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_files: ${{ steps.changed-files.outputs.any_changed }}
      pr_ref: ${{ steps.get-pr.outputs.ref }}
    steps:
      - name: Get PR details
        id: get-pr
        run: |
          PR_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.event.issue.pull_request.url }}")
          echo "ref=$(echo $PR_DATA | jq -r .head.ref)" >> $GITHUB_OUTPUT
          echo "sha=$(echo $PR_DATA | jq -r .head.sha)" >> $GITHUB_OUTPUT
          echo "base=$(echo $PR_DATA | jq -r .base.ref)" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.get-pr.outputs.ref }}
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          base_sha: origin/${{ steps.get-pr.outputs.base }}
          files: |
            **.md
          files_ignore: |
            **.ja.md
            **.zh-TW.md
            **.zh-CN.md

      - name: Set matrix
        id: set-matrix
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          files=(${{ steps.changed-files.outputs.all_changed_files }})
          matrix=$(printf '%s\n' "${files[@]}" | jq -R . | jq -s -c .)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  translate-and-commit:
    needs: get-files
    if: needs.get-files.outputs.has_files == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.get-files.outputs.pr_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install deepl-node
        run: npm install deepl-node

      - name: Create translation script
        run: |
          cat << 'EOF' > translate.mjs
          import * as deepl from 'deepl-node';
          import { readFileSync, writeFileSync } from 'fs';

          const authKey = process.env.DEEPL_API_KEY;
          const translator = new deepl.Translator(authKey);

          const filePath = process.argv[2];
          let targetLang = process.argv[3];
          const outputPath = process.argv[4];

          if (targetLang === 'zh-CN') targetLang = 'zh';
          if (targetLang === 'zh-TW') targetLang = 'zh-hant';

          async function main() {
            try {
              const content = readFileSync(filePath, 'utf8');
              const result = await translator.translateText(content, null, targetLang, {
                tagHandling: 'xml',
                ignoreTags: ['code', 'pre']
              });

              let fixedText = result.text.replace(/＃/g, '#').replace(/＊/g, '*').replace(/＿/g, '_')
                                        .replace(/｀/g, '`').replace(/［/g, '[').replace(/］/g, ']')
                                        .replace(/｛/g, '{').replace(/｝/g, '}');

              writeFileSync(outputPath, fixedText, 'utf8');
              console.log(`  -> Saved: ${outputPath}`);
            } catch (err) {
              console.error(`  -> Error translating ${filePath}:`, err);
              process.exit(1);
            }
          }
          main();
          EOF

      - name: Run translations sequentially
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          FILES_JSON: ${{ needs.get-files.outputs.matrix }}
        run: |
          langs=("ja" "zh-CN" "zh-TW")

          for file in $(echo "$FILES_JSON" | jq -r '.[]'); do
            echo "Processing $file..."
            for lang in "${langs[@]}"; do
              base="${file%.md}"
              output_file="${base}.${lang}.md"
              echo "  Translating to $lang..."
              node translate.mjs "$file" "$lang" "$output_file"
            done
          done

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add translations for modified markdown files"
            git push origin HEAD:${{ needs.get-files.outputs.pr_ref }}
          fi
